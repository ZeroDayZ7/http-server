name: Go Kubernetes Deployment

on:
  push:
    branches: [staging]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # -------------------
      # TAILSCALE DEBUG START
      # -------------------
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:server

      - name: Tailscale debug info
        run: |
          echo "==== TAILSCALE STATUS ===="
          tailscale status

          echo "==== IP ===="
          ip a

          echo "==== ROUTES ===="
          ip route

          echo "==== DNS ===="
          cat /etc/resolv.conf

      - name: Ping / connectivity test
        run: |
          echo "==== PING NODE ===="
          ping -c 3 100.75.109.94 || true

          echo "==== TCP CHECK (6443) ===="
          nc -zv 100.75.109.94 6443 || true

          echo "==== CURL K8S API ===="
          curl -k https://100.75.109.94:6443/healthz || true

      # -------------------
      # DOCKER
      # -------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API
        run: |
          IMAGE=ghcr.io/${{ vars.GHCR_OWNER }}/${{ vars.GHCR_IMAGE }}-api:${{ steps.vars.outputs.sha_short }}

          docker build -t $IMAGE -f cmd/api/Dockerfile .
          docker push $IMAGE

      # -------------------
      # KUBECONFIG DEBUG
      # -------------------
      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Kubeconfig debug
        run: |
          echo "==== KUBECONFIG FILE ===="
          cat kubeconfig | sed 's/client-certificate-data:.*/client-certificate-data: ***REDACTED***/' || true

          echo "==== KUBECTL CONFIG VIEW ===="
          kubectl config view

          echo "==== CURRENT CONTEXT ===="
          kubectl config current-context

          echo "==== CLUSTERS ===="
          kubectl config get-clusters

          echo "==== USERS ===="
          kubectl config get-users

      # -------------------
      # KUBERNETES DEBUG
      # -------------------
      - name: Cluster connectivity debug
        run: |
          echo "==== KUBECTL VERSION ===="
          kubectl version --client

          echo "==== API SERVER VERSION ===="
          kubectl version --short || true

          echo "==== CLUSTER INFO ===="
          kubectl cluster-info || true

          echo "==== GET NODES ===="
          kubectl get nodes -v=8 || true

          echo "==== GET PODS ALL NAMESPACES ===="
          kubectl get pods -A -v=8 || true

      # -------------------
      # DEPLOY
      # -------------------
      - name: Deploy API
        run: |
          IMAGE=ghcr.io/${{ vars.GHCR_OWNER }}/${{ vars.GHCR_IMAGE }}-api:${{ steps.vars.outputs.sha_short }}

          echo "Using IMAGE=$IMAGE"
          echo "Deploying image: $IMAGE"

          kubectl set image deployment/go-api go-api=$IMAGE -v=8

          kubectl rollout status deployment/go-api -v=8

      # -------------------
      # FINAL DEBUG
      # -------------------
      - name: Post deploy debug
        if: always()
        run: |
          echo "==== PODS ===="
          kubectl get pods -o wide || true

          echo "==== EVENTS ===="
          kubectl get events --sort-by=.metadata.creationTimestamp || true

          echo "==== ROLLOUT STATUS ===="
