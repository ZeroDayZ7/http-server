name: Go Kubernetes Deployment

on:
  push:
    branches: [staging]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Budowanie API ---
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/http-server-api:${{ steps.vars.outputs.sha_short }}

      # --- Budowanie WORKERA ---
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/http-server-worker:${{ steps.vars.outputs.sha_short }}

      # --- Aktualizacja obrazów w YAMLach (GitOps) ---
      - name: Update YAML Images
        run: |
          SHA=${{ steps.vars.outputs.sha_short }}
          OWNER=${{ steps.vars.outputs.owner_lc }}

          echo "Updating manifests with owner: $OWNER and sha: $SHA"

          # Ścieżka do Twoich plików w overlays/staging
          MANIFEST_DIR="k8s/overlays/staging"

          sed -i "s|image: ghcr.io/.*/http-server-api:.*|image: ghcr.io/$OWNER/http-server-api:$SHA|g" $MANIFEST_DIR/deployment.yaml
          sed -i "s|image: ghcr.io/.*/http-server-worker:.*|image: ghcr.io/$OWNER/http-server-worker:$SHA|g" $MANIFEST_DIR/worker-deployment.yaml

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Dodajemy zmienione pliki z poprawnej ścieżki
          git add k8s/overlays/staging/deployment.yaml k8s/overlays/staging/worker-deployment.yaml

          git commit -m "Deploy: images update to ${{ steps.vars.outputs.sha_short }}" || echo "No changes"
          git push
