name: Go Docker Deployment

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run Tests
        run: go test ./... -v

      - name: Generate .env file from Secrets
        run: |
          echo "APP_NAME=${{ secrets.APP_NAME }}" >> .env
          echo "APP_VERSION=${{ secrets.APP_VERSION }}" >> .env
          echo "ENV=production" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "SERVER_HEADER=${{ secrets.SERVER_HEADER }}" >> .env
          echo "PREFORK=${{ secrets.PREFORK }}" >> .env
          echo "CASE_SENSITIVE=${{ secrets.CASE_SENSITIVE }}" >> .env
          echo "STRICT_ROUTING=${{ secrets.STRICT_ROUTING }}" >> .env
          echo "BODY_LIMIT_MB=${{ secrets.BODY_LIMIT_MB }}" >> .env
          echo "IDLE_TIMEOUT_SEC=${{ secrets.IDLE_TIMEOUT_SEC }}" >> .env
          echo "READ_TIMEOUT_SEC=${{ secrets.READ_TIMEOUT_SEC }}" >> .env
          echo "WRITE_TIMEOUT_SEC=${{ secrets.WRITE_TIMEOUT_SEC }}" >> .env
          echo "SHUTDOWN_TIMEOUT_SEC=${{ secrets.SHUTDOWN_TIMEOUT_SEC }}" >> .env

          echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
          echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env

          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "REDIS_DB=${{ secrets.REDIS_DB }}" >> .env

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: |
            .
          target: "/home/${{ secrets.SERVER_USER }}/domains/backend/temp/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BASE="/home/${{ secrets.SERVER_USER }}/domains/backend"

            mkdir -p $BASE/temp
            mkdir -p $BASE/production

            cd $BASE/temp

            # build docker image
            docker compose build

            # podmień aplikację (ZERO DOWNTIME READY)
            docker compose up -d

            # opcjonalny health check
            sleep 5
            curl -f http://localhost:${{ secrets.PORT }}/health || exit 1
