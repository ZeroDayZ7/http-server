name: Go Docker Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: go test ./... -v

      - name: Create .env
        run: |
          echo "PORT=${{ secrets.PORT }}" > .env

      - name: Deploy
        run: |
          podman compose up -d --build

      - name: Health check
        run: curl -f http://localhost:${{ secrets.PORT }}/health
